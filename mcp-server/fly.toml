# Fly.io deployment config for the Civil Rights History Project MCP server.
#
# Quickstart:
#   1. Install flyctl:    https://fly.io/docs/hands-on/install-flyctl/
#   2. flyctl auth login
#   3. (Edit this file) set `app = "<your-app-name>"` -- the placeholder
#      below is a suggestion; pick something unique on Fly.io.
#   4. flyctl launch --copy-config --no-deploy
#   5. flyctl secrets set OPENAI_API_KEY=sk-...
#      flyctl secrets set ANTHROPIC_API_KEY=sk-ant-...     (optional)
#      flyctl secrets set FIREBASE_SERVICE_ACCOUNT_PATH=/secrets/sa.json
#   6. Upload the service-account JSON via flyctl machines exec or a
#      mounted volume; the simpler path is to inline the JSON as a single
#      env var (FIREBASE_SERVICE_ACCOUNT_JSON) and read+parse it inside
#      server.mjs's initialization (small follow-up patch to server.mjs).
#   7. flyctl deploy
#   8. Configure the custom domain in Fly: flyctl certs add mcp.robotlogic.org
#      then add the CNAME record at robotlogic.org's registrar pointing
#      mcp -> <appname>.fly.dev (or the AAAA records Fly returns).

app = "civil-rights-history-mcp"
primary_region = "sea"   # Seattle. Close to Eric in the Pacific Northwest;
                         # adjust if the team's geographic center shifts.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

# HTTP service exposes the MCP server's POST /mcp endpoint and the
# /healthz probe. Fly's edge handles TLS termination, so internal_port
# stays plain HTTP on 3001.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # Scale to zero when idle to save cost;
                              # raise to 1 if cold-start latency on a demo
                              # call becomes a problem at the conference.

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# Liveness/readiness check on the Express /healthz endpoint that
# server.mjs registers.
[[http_service.checks]]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512
  # 512 MB is plenty for a thin MCP shim. The vector-search path holds
  # the full embeddings collection in memory transiently per request
  # (see server.mjs's cosineSimilarity loop) -- for the current corpus
  # (~131 interviews + segments) the working set fits comfortably; for
  # larger corpora the right move is migrating to Firestore's native
  # vector index rather than scaling this VM up.
