# Fly.io deployment config for the Civil Rights History Project MCP server.
#
# Quickstart:
#   1. Install flyctl:    https://fly.io/docs/hands-on/install-flyctl/
#   2. flyctl auth login
#   3. (Edit this file) set `app = "<your-app-name>"` -- the placeholder
#      below is a suggestion; pick something unique on Fly.io.
#   4. From the mcp-server/ directory: npm run build:leaders   (generates
#      data/leaders.json from transcripts/corrected/ manifests). Commit
#      the result so future Docker builds pick it up.
#   5. flyctl launch --copy-config --no-deploy
#   6. flyctl secrets set PINECONE_API_KEY=...
#      flyctl secrets set PINECONE_HOST=https://civil-rights-<hash>.svc.<region>.pinecone.io
#      flyctl secrets set VOYAGE_API_KEY=...
#      (optional) flyctl secrets set PINECONE_INDEX=civil-rights
#      (optional) flyctl secrets set VOYAGE_MODEL=voyage-3
#      (optional) flyctl secrets set VOYAGE_RERANK_MODEL=rerank-2
#      (optional) flyctl secrets set MCP_RERANK_ENABLED=true
#   7. flyctl deploy
#   8. Configure the custom domain in Fly: flyctl certs add mcp.spokenhistory.org
#      then add the CNAME record at spokenhistory.org's registrar pointing
#      mcp -> <appname>.fly.dev (or the AAAA records Fly returns).
#
# The post-2026-05-25 rewire removed the Firebase Admin + OpenAI
# dependencies. Pinecone (civil-rights project) + Voyage AI (voyage-3
# embedding + rerank-2) are the sole runtime dependencies; data/leaders.json
# is baked into the image at build time.

app = "civil-rights-history-mcp"
primary_region = "sjc"   # San Jose. Nearest active West-Coast region to Eric
                         # in the Pacific Northwest (Fly deprecated "sea"/Seattle
                         # for new resources on 2026-06). Adjust if the team's
                         # geographic center shifts.

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

# HTTP service exposes the MCP server's POST /mcp endpoint and the
# /healthz probe. Fly's edge handles TLS termination, so internal_port
# stays plain HTTP on 3001.
[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0   # Scale to zero when idle to save cost. The
                              # tradeoff is a ~1-2s cold start on the first
                              # request after an idle period; raise to 1 for a
                              # latency-sensitive window (e.g. a live demo),
                              # then set back to 0.

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# Liveness/readiness check on the Express /healthz endpoint that
# server.mjs registers.
[[http_service.checks]]
  type = "http"
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 256
  # 256 MB is plenty for the post-rewire shim. Embedding + retrieval
  # happen on Voyage / Pinecone (HTTP calls, no in-process vectors), so
  # the server's working set is just Express + the MCP SDK + a small
  # leaders.json roster. The prior 512 MB was sized for the in-process
  # Firestore cosine-similarity scan that the rewire removed.
