name: preview-dist

# Temporary helper for the essays-image-enrichment branch: builds the Vite
# frontend in the cloud (the local build is blocked by antivirus on the dev
# machine) and uploads dist/ as an artifact, so a draft Netlify deploy can be
# pushed from the built output without a local build. Remove before merge.

on:
  push:
    branches: ['essays-image-enrichment']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 3
