<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Civil Rights History Project</title>

    <!-- Description -- shown in search engine snippets and as the
         default-share-text fallback when no Open Graph description
         is configured for the specific shared URL. -->
    <meta name="description" content="An open-source AI system that transforms the Library of Congress Civil Rights History Project oral history archive, roughly 250 hours of interviews produced in collaboration with the Smithsonian NMAAHC, into transparent, interpretable public knowledge with auditable summaries, chapter breaks, and topic-curated playlists." />

    <!-- Theme color -- controls the mobile browser chrome tint on
         Android Chrome / Samsung Internet / iOS Safari standalone.
         Matches the brand red so the system UI feels continuous with
         the site. -->
    <meta name="theme-color" content="#F2483C" />
    <meta name="color-scheme" content="light dark" />

    <!-- Apply the saved light/dark choice before first paint to avoid a
         flash of the wrong theme. Dark is opt-in via the header toggle
         (stored as theme=dark in localStorage); the default is light. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>

    <!-- Apply the saved "Pause Animations" choice before first paint, so a
         visitor who paused (or whose OS asks for reduced motion) never sees
         a flash of looping motion on load. Stored as animationsPaused in
         localStorage by the header toggle; with no stored choice we follow
         the OS prefers-reduced-motion setting. Mirrored as
         data-animations-paused on <html> (CSS reads it to freeze keyframe
         animations; the timeline page reads it in JS to pause its videos). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('animationsPaused');
          var paused = stored === 'true'
            || (stored == null
                && window.matchMedia
                && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
          document.documentElement.setAttribute(
            'data-animations-paused', paused ? 'true' : 'false'
          );
        } catch (e) {}
      })();
    </script>

    <!-- Open Graph tags for social sharing (Twitter / X, Facebook,
         LinkedIn, Slack, Discord, Bluesky, etc. all read these). -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Civil Rights History Project" />
    <meta property="og:description" content="An open-source AI system that transforms the Library of Congress Civil Rights History Project oral history archive into transparent, interpretable public knowledge." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter card -- summary_large_image would need an actual
         hosted image asset; summary is the fallback that works
         without one. -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Civil Rights History Project" />
    <meta name="twitter:description" content="An open-source AI system that transforms the Library of Congress Civil Rights History Project oral history archive into transparent, interpretable public knowledge." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Lora:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=Source+Serif+Pro:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700;1,900&family=Chivo+Mono:ital,wght@0,100..900;1,100..900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <script src="https://www.youtube.com/iframe_api"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
